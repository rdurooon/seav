<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>SEAV - Sistema Embarcado de Acesso Veicular</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/modal.css" />
    <link rel="icon" type="image/png" href="assets/SEAV-logo.png" />
  </head>
  <body>
    <button id="btn-voltar" onclick="navegarPara('menu')" style="display: none">
      ← Voltar
    </button>

    <main id="content"></main>

    <!-- MODAL INFO -->
    <div id="modal-info" class="modal-overlay">
      <div class="modal-box" style="width: 400px">
        <h2 class="modal-titulo">Sobre o SEAV</h2>
        <p style="font-size: 0.9rem"><strong>Versão:</strong> 1.0</p>
        <p style="font-size: 0.9rem"><strong>Criadores:</strong></p>
        <ul style="font-size: 0.9rem; padding-left: 20px; line-height: 2">
          <li>Leandro Marques</li>
          <li>Pedro Smith</li>
          <li>Ruan Durão</li>
          <li>Lucas Mendes</li>
          <li>Fábio Martel</li>
        </ul>
        <div class="modal-rodape">
          <button onclick="fecharInfo()">Fechar</button>
        </div>
      </div>
    </div>

    <!-- MODAL CONFIG -->
    <div id="modal-config" class="modal-overlay">
      <div class="modal-box" style="width: 400px">
        <h2 class="modal-titulo">Configurações</h2>
        <div style="display: flex; flex-wrap: wrap; align-items: center; gap: 10px">
          <label style="font-size: 0.9rem; font-weight: 600"
            >Porta do receptor: COM</label
          >
          <input
            type="number"
            id="porta-com"
            min="1"
            max="9"
            placeholder="1~9"
            style="
              width: 60px;
              padding: 6px 10px;
              border: 1.5px solid var(--cor-borda);
              border-radius: 6px;
              font-size: 0.9rem;
            "
          />
          <button
            id="btn-autodetectar"
            onclick="autodetectarPorta()"
            style="font-size: 0.8rem; padding: 6px 10px"
          >
            Autodetectar
          </button>
          <div style="display:flex; align-items:center; gap:8px; margin-left:12px;">
            <label for="suppress-errors-toggle" style="font-size:0.9rem;">Suprimir erros no terminal</label>
            <input type="checkbox" id="suppress-errors-toggle" />
          </div>
        </div>
        <div style="margin-top: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
          <button onclick="abrirModalAjuste()" style="font-size: 0.85rem; padding: 8px 12px">
            Ajustar reconhecimento
          </button>
        </div>
        <div class="modal-rodape">
          <button class="btn-cancelar" onclick="fecharConfig()">
            Cancelar
          </button>
          <button onclick="salvarConfig()">Salvar</button>
        </div>
      </div>
    </div>

    <div id="modal-ajuste" style="display:none; position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.35); z-index:150; align-items:center; justify-content:center;">
      <div style="width:80%; max-width:900px; background:#ffffff; padding:16px; border-radius:16px; position:relative; color:#102a43; box-shadow:0 20px 45px rgba(0,0,0,0.18);">
        <button id="modal-close" style="position:absolute; right:12px; top:12px; background:transparent; border:none; color:#0b4ed0; font-size:24px; font-weight:700; z-index:1000; cursor:pointer;">✕</button>
        <div style="position:relative; width:100%; height:480px; background:#f7fbff; border-radius:12px; overflow:hidden;">
          <img id="camera-stream-modal" src="" alt="Camera Stream Modal" style="width:100%; height:100%; object-fit:cover; display:block;" />
          <canvas id="camera-canvas-modal" style="position:absolute; left:0; top:0; width:100%; height:100%; pointer-events:auto; z-index:5;"></canvas>
        </div>
        <div id="ocr-results" style="text-align:center; margin-top:12px; color:#0b4ed0; font-size:18px;">
          <div id="ocr-text" style="font-weight:700;">Nenhum resultado</div>
          <div id="ocr-meta" style="font-size:14px; color:#334e68;"></div>
        </div>
      </div>
    </div>

    <!-- MODAL ADICIONAR -->
    <div id="modal-adicionar" class="modal-overlay">
      <div
        class="modal-box"
        style="width: 600px; max-height: 80vh; overflow-y: auto"
      >
        <h2 class="modal-titulo">Adicionar</h2>
        <div class="modal-grid">
          <div class="modal-secao">Morador</div>
          <input id="add-nome" placeholder="Nome completo" />
          <input
            id="add-cpf"
            placeholder="CPF (000.000.000-00)"
            maxlength="14"
          />
          <input id="add-data" type="date" />
          <select id="add-sexo">
            <option value="">Sexo</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
          </select>

          <div class="modal-secao">Contato</div>
          <input
            id="add-celular"
            placeholder="Celular (00) 00000-0000"
            maxlength="15"
          />
          <input id="add-email" placeholder="Email" />

          <div class="modal-secao">Endereço</div>
          <input id="add-cep" placeholder="CEP (00000-000)" maxlength="9" />
          <input id="add-numero" placeholder="Número" />
          <input id="add-rua" placeholder="Rua" readonly />
          <input id="add-bairro" placeholder="Bairro" readonly />
          <input id="add-cidade" placeholder="Cidade" readonly />
          <input id="add-estado" placeholder="UF" readonly />

          <div class="modal-secao">Veículo</div>
          <input id="add-modelo" placeholder="Modelo" />
          <input id="add-cor" placeholder="Cor" />
          <input id="add-placa" placeholder="Placa" />
        </div>
        <div class="modal-rodape">
          <button class="btn-cancelar" onclick="fecharModalAdicionar()">
            Cancelar
          </button>
          <button onclick="salvarAdicionar()">Salvar</button>
        </div>
      </div>
    </div>

    <!-- MODAL ATUALIZAR -->
    <div id="modal-atualizar" class="modal-overlay">
      <div
        class="modal-box"
        style="width: 600px; max-height: 80vh; overflow-y: auto"
      >
        <h2 class="modal-titulo">Atualizar</h2>
        <div class="modal-grid">
          <div class="modal-secao">Morador</div>
          <input id="upd-nome" placeholder="Nome completo" />
          <input
            id="upd-cpf"
            placeholder="CPF (000.000.000-00)"
            maxlength="14"
          />
          <input id="upd-data" type="date" />
          <select id="upd-sexo">
            <option value="">Sexo</option>
            <option value="M">Masculino</option>
            <option value="F">Feminino</option>
          </select>

          <div class="modal-secao">Contato</div>
          <input
            id="upd-celular"
            placeholder="Celular (00) 00000-0000"
            maxlength="15"
          />
          <input id="upd-email" placeholder="Email" />

          <div class="modal-secao">Endereço</div>
          <input id="upd-cep" placeholder="CEP (00000-000)" maxlength="9" />
          <input id="upd-numero" placeholder="Número" />
          <input id="upd-rua" placeholder="Rua" />
          <input id="upd-bairro" placeholder="Bairro" />
          <input id="upd-cidade" placeholder="Cidade" />
          <input id="upd-estado" placeholder="UF" />

          <div class="modal-secao">Veículo</div>
          <input id="upd-modelo" placeholder="Modelo" />
          <input id="upd-cor" placeholder="Cor" />
          <input id="upd-placa" placeholder="Placa" />
        </div>
        <div class="modal-rodape">
          <button class="btn-cancelar" onclick="fecharModalAtualizar()">
            Cancelar
          </button>
          <button onclick="salvarAtualizar()">Salvar</button>
        </div>
      </div>
    </div>

    <!-- MODAL REMOVER -->
    <div id="modal-remover" class="modal-overlay">
      <div class="modal-box" style="width: 400px; text-align: center">
        <h2 class="modal-titulo">Remover Morador</h2>
        <p style="font-size: 0.95rem; color: #1e2d3d" id="msg-remover"></p>
        <div class="modal-rodape" style="justify-content: center">
          <button class="btn-cancelar" onclick="fecharModalRemover()">
            Cancelar
          </button>
          <button style="background: #e74c3c" onclick="confirmarRemover()">
            Remover
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL BUSCA -->
    <div id="modal-busca" class="modal-overlay">
      <div class="modal-box" style="width: 500px">
        <h2 class="modal-titulo" id="modal-busca-titulo">Buscar Morador</h2>
        <input
          type="text"
          id="campo-busca-modal"
          placeholder="Digite nome, CPF ou placa..."
          style="
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--cor-borda);
            border-radius: 8px;
            font-family: var(--fonte);
            font-size: 0.9rem;
          "
        />
        <div
          id="resultados-busca"
          style="
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 250px;
            overflow-y: auto;
          "
        ></div>
        <div class="modal-rodape">
          <button class="btn-cancelar" onclick="fecharModalBusca()">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <!-- MODAL ACESSO -->
    <div id="modal-acesso" class="modal-overlay"></div>

    <script src="js/home.js"></script>
  </body>
</html>
