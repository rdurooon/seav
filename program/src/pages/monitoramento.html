<link rel="stylesheet" href="css/monitoramento.css" />
<div class="monitoramento-container">
  <div class="mon-topo">
    <span id="relogio"></span>
    <span id="status-sistema">Status do sistema: Sem Conexão</span>
  </div>

  <div class="mon-conteudo">
    <div class="mon-camera">
      <div class="camera-feed">
        <div class="camera-wrapper">
          <img id="camera-stream" src="" alt="Camera Stream" style="width:100%; height:100%; object-fit:cover; display:block;" />
          <canvas id="camera-canvas" style="position:absolute; left:0; top:0; pointer-events:auto;"></canvas>
          <div id="camera-placeholder" class="camera-placeholder">Sem sinal</div>
          <div id="placa-panel" style="position:absolute; left:10px; top:10px; background:rgba(0,0,0,0.6); color:#0f0; padding:8px; border-radius:6px; display:none; z-index:10;"></div>
        </div>
      </div>
    </div>

    <div class="mon-tabela">
      <h2>Últimos acessos:</h2>
      <table>
        <thead>
          <tr>
            <th>Placa</th>
            <th>Veículo</th>
            <th>Morador</th>
            <th>Data e hora</th>
          </tr>
        </thead>
        <tbody id="tabela-acessos">
          <!-- dados injetados pelo monitoramento.js -->
        </tbody>
      </table>
    </div>
  </div>

  <div class="mon-botoes">
    <button onclick="abrirFecharAcesso()">Abrir/fechar acesso</button>
    <button onclick="ativarDesativarAutomacao()">
      Ativar/desativar automação
    </button>
  </div>
</div>
