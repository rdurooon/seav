<link rel="stylesheet" href="css/historico.css" />

<div class="historico-container">
  <div class="historico-topo">
    <span id="relogio"></span>
    <span id="status-sistema">Status do sistema: Sem Conexão</span>
  </div>

  <div class="historico-conteudo">
    <div class="historico-header">
      <h2>Histórico</h2>
    </div>

    <div
      class="historico-filtros"
      style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap"
    >
      <input type="date" id="filtro-data-inicio" placeholder="Data início" />
      <input type="date" id="filtro-data-fim" placeholder="Data fim" />
      <input type="text" id="filtro-placa" placeholder="Placa" />
      <button onclick="filtrar()">Filtrar</button>
      <span style="flex: 1"></span>

      <button
        class="btn-limpar-tudo"
        title="Limpar todo o histórico"
        style="
          background: none;
          border: 1px solid #e74c3c;
          color: #e74c3c;
          padding: 6px 12px;
          border-radius: 6px;
          cursor: pointer;
          font-size: 0.85rem;
          display: flex;
          align-items: center;
          gap: 6px;
          transition: 0.2s;
          white-space: nowrap;
        "
        onmouseover="
          this.style.background = '#e74c3c';
          this.style.color = '#fff';
        "
        onmouseout="
          this.style.background = 'none';
          this.style.color = '#e74c3c';
        "
      >
        Limpar histórico
      </button>
    </div>

    <div class="historico-tabela">
      <table>
        <thead>
          <tr>
            <th>Placa</th>
            <th>Veículo</th>
            <th>Morador</th>
            <th>Endereço</th>
            <th>Data e hora</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tabela-historico"></tbody>
      </table>
    </div>
  </div>
</div>
